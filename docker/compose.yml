      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  native-maximal-nginx:
    build:
      context: ..
      dockerfile: docker/runtimes/php-fpm/Dockerfile.native-maximal-nginx
    depends_on:
      native-maximal-php-fpm:
        condition: service_started
    ports:
      - "${NATIVE_MAXIMAL_HTTP_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q 'ok'"]
