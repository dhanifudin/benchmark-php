    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 10

  native-frankenphp-worker:
    build:
      context: ..
      dockerfile: docker/runtimes/frankenphp-worker/Dockerfile.native
      args:
        PHP_VERSION: ${PHP_VERSION}
    environment:
      APP_ENV: benchmark
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PHP_RUNTIME_CONFIG: ${NATIVE_FRANKENPHP_WORKER_RUNTIME_CONFIG}
      MAX_REQUESTS: 0
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NATIVE_FRANKENPHP_WORKER_HTTP_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q 'ok'"]
      interval: 10s
