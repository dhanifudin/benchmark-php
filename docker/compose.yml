services:
  mariadb:
    image: mariadb:${MARIADB_VERSION}
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    ports:
      - "${MARIADB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MARIADB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./services/mariadb/initdb:/docker-entrypoint-initdb.d:ro
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:${REDIS_VERSION}
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  wrk:
    image: ${WRK_IMAGE}
    entrypoint: ["sh", "-lc"]
    command:
      - |
        echo "wrk runner container is available for scripted benchmark runs."

  native-php-fpm:
    build:
      context: ..
      dockerfile: docker/runtimes/php-fpm/Dockerfile.native
      args:
        PHP_VERSION: ${PHP_VERSION}
    environment:
      APP_ENV: benchmark
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PHP_RUNTIME_CONFIG: ${NATIVE_PHP_RUNTIME_CONFIG}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  native-nginx:
    build:
      context: ..
      dockerfile: docker/runtimes/php-fpm/Dockerfile.native-nginx
    depends_on:
      native-php-fpm:
        condition: service_started
    ports:
      - "${NATIVE_HTTP_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 10

  native-modphp:
    build:
      context: ..
      dockerfile: docker/runtimes/mod-php/Dockerfile.native
      args:
        PHP_VERSION: ${PHP_VERSION}
    environment:
      APP_ENV: benchmark
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PHP_RUNTIME_CONFIG: ${NATIVE_MODPHP_RUNTIME_CONFIG}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${NATIVE_MODPHP_HTTP_PORT}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz | grep -q 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 10

  native-frankenphp:
    build:
      context: ..
      dockerfile: docker/runtimes/frankenphp-classic/Dockerfile.native
      args:
        PHP_VERSION: ${PHP_VERSION}
    environment:
      APP_ENV: benchmark
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PHP_RUNTIME_CONFIG: ${NATIVE_FRANKENPHP_RUNTIME_CONFIG}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
