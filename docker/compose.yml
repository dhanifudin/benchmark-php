      retries: 10

  laravel-php-fpm:
    build:
      context: ..
      dockerfile: docker/runtimes/php-fpm/Dockerfile.laravel
      args:
        PHP_VERSION: ${PHP_VERSION}
    environment:
      APP_ENV: benchmark
      APP_DEBUG: "false"
      APP_URL: http://laravel-nginx
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      SESSION_DRIVER: file
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: null
      PHP_RUNTIME_CONFIG: ${LARAVEL_PHP_RUNTIME_CONFIG}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  laravel-nginx:
