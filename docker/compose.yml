      retries: 10

  native-obfuscated-php-fpm:
    build:
      context: ..
      dockerfile: docker/runtimes/php-fpm/Dockerfile.native-obfuscated
      args:
        PHP_VERSION: ${PHP_VERSION}
    environment:
      APP_ENV: benchmark
      BENCHMARK_FRAMEWORK_VERSION: native-yakpro-minimal
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: ${MARIADB_DATABASE}
      DB_USERNAME: ${MARIADB_USER}
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
